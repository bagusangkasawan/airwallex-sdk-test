<!DOCTYPE html>
<html lang="id">
<head>
  <link rel="icon" href="https://www.airwallex.com/favicon.ico">
  <title>Airwallex Checkout Test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://checkout.airwallex.com/assets/elements.bundle.min.js"></script>
  <style>
    :root {
      --bg-top: #f2f9ff;
      --bg-bottom: #e9eef7;
      --surface: rgba(255, 255, 255, 0.86);
      --surface-border: rgba(18, 55, 94, 0.14);
      --text-main: #10213b;
      --text-muted: #4c6381;
      --primary: #0a7fcf;
      --primary-dark: #0868aa;
      --shadow: 0 22px 55px rgba(10, 68, 120, 0.16);
      --radius-lg: 18px;
      --radius-md: 12px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: "Outfit", "Segoe UI", sans-serif;
      min-height: 100vh;
      margin: 0;
      color: var(--text-main);
      background:
        radial-gradient(circle at 20% 15%, rgba(10, 127, 207, 0.18), transparent 38%),
        radial-gradient(circle at 85% 10%, rgba(0, 181, 173, 0.16), transparent 36%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      display: grid;
      place-items: center;
      padding: 28px 16px;
    }

    .panel {
      width: 100%;
      max-width: 560px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--surface-border);
      background: var(--surface);
      backdrop-filter: blur(6px);
      box-shadow: var(--shadow);
      padding: 26px;
      animation: fadeInUp 0.5s ease-out;
    }

    h2 {
      margin: 0;
      font-size: 1.55rem;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .subtitle {
      margin: 8px 0 20px;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .view-switch {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .view-switch button {
      box-shadow: none;
      background: #e7f1fe;
      color: #17508a;
      border: 1px solid #bfd2ea;
    }

    .view-switch button.active {
      background: linear-gradient(135deg, var(--primary), #119cbf);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 10px 20px rgba(10, 127, 207, 0.2);
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.92rem;
      font-weight: 600;
      color: #1d365a;
    }

    textarea {
      width: 100%;
      min-height: 90px;
      padding: 12px 14px;
      margin-bottom: 14px;
      border-radius: var(--radius-md);
      border: 1px solid #bfd2ea;
      font-family: "Outfit", "Segoe UI", sans-serif;
      font-size: 0.94rem;
      color: var(--text-main);
      background: #ffffff;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      resize: vertical;
    }

    textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(10, 127, 207, 0.15);
    }

    #dropin-container {
      background: #ffffff;
      padding: 16px;
      border-radius: var(--radius-md);
      margin: 16px 0;
      min-height: 100px;
      border: 1px solid #bfd2ea;
      transition: all 0.3s ease;
    }

    #card-container {
      background: #ffffff;
      padding: 12px;
      border-radius: var(--radius-md);
      margin: 16px 0;
      min-height: 58px;
      border: 1px solid #bfd2ea;
      display: flex;
      align-items: center;
      transition: all 0.3s ease;
    }

    #card-container > * {
      width: 100%;
    }

    button {
      padding: 12px 16px;
      background: linear-gradient(135deg, var(--primary), #119cbf);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      width: 100%;
      font-family: "Outfit", "Segoe UI", sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      transition: transform 0.15s ease, box-shadow 0.2s ease, filter 0.2s ease;
      box-shadow: 0 12px 24px rgba(10, 127, 207, 0.22);
    }

    button:hover {
      filter: brightness(1.03);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .divider {
      margin: 20px 0;
      border: 0;
      border-top: 1px solid #d6e3f4;
    }

    #result {
      margin-top: 14px;
      padding: 10px 12px;
      border-radius: 10px;
      background: #f5f9ff;
      border: 1px solid #d5e4f8;
      color: #1b3458;
      min-height: 43px;
      display: flex;
      align-items: center;
      font-size: 0.93rem;
      word-break: break-word;
      line-height: 1.4;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <main class="panel">
    <h2>Airwallex Payment Test</h2>
    <p class="subtitle">Satu halaman untuk Card Only dan All Methods (Drop-in).</p>

    <div class="view-switch">
      <button id="tab-card" class="active" type="button" onclick="setView('card')">Card Only</button>
      <button id="tab-dropin" type="button" onclick="setView('dropin')">All Methods (Drop-in)</button>
    </div>

    <section id="view-card" class="view active">
      <label for="cardClientSecret">Client Secret</label>
      <textarea id="cardClientSecret" placeholder="Paste client_secret di sini..."></textarea>

      <button onclick="initCardPayment()">Init Card Payment</button>

      <div id="card-container">Silakan klik "Init Card Payment" untuk memuat...</div>

      <button onclick="payCard()">Bayar (Card)</button>
    </section>

    <section id="view-dropin" class="view">
      <label for="intentId">Intent ID</label>
      <textarea id="intentId" placeholder="Paste intent_id (contoh: int_...)" style="min-height: 50px;"></textarea>

      <label for="currency">Currency (Mata Uang)</label>
      <textarea id="currency" placeholder="Contoh: USD, IDR, SGD..." style="min-height: 40px;">USD</textarea>

      <label for="clientSecret">Client Secret</label>
      <textarea id="clientSecret" placeholder="Paste client_secret di sini..."></textarea>

      <button onclick="initDropinPayment()">Init Drop-in Payment</button>

      <div id="dropin-container">Silakan klik "Init Drop-in Payment" untuk memuat...</div>
    </section>

    <hr class="divider">

    <p id="result">Siap untuk memulai.</p>
  </main>

  <script>
    let dropInElement;
    let cardElement;

    function setView(viewType) {
      const isCard = viewType === 'card';
      document.getElementById('tab-card').classList.toggle('active', isCard);
      document.getElementById('tab-dropin').classList.toggle('active', !isCard);
      document.getElementById('view-card').classList.toggle('active', isCard);
      document.getElementById('view-dropin').classList.toggle('active', !isCard);
      document.getElementById('result').innerText = isCard
        ? 'View Card aktif.'
        : 'View Drop-in aktif.';
    }

    // Pelacak rahasia untuk menangkap pesan error dari dalam iframe Airwallex yang disembunyikan
    window.addEventListener('message', (event) => {
      if (event.origin.includes('airwallex.com') && event.data) {
        console.log("Iframe Broadcast:", event.data);
      }
    });

    async function initCardPayment() {
      const clientSecret = document.getElementById('cardClientSecret').value.trim();
      const resultEl = document.getElementById('result');

      if (!clientSecret) {
        resultEl.innerHTML = "⚠️ Isi Client Secret terlebih dahulu!";
        return;
      }

      resultEl.innerHTML = "Membangun form kartu...";

      try {
        await Airwallex.init({
          env: "prod",
          origin: window.location.origin
        });

        const container = document.getElementById('card-container');
        container.innerHTML = "";

        cardElement = Airwallex.createElement('card');
        cardElement.mount('card-container');
        resultEl.innerHTML = "✅ Form kartu siap.";
      } catch (err) {
        console.error(err);
        resultEl.innerHTML = "❌ Gagal memuat form kartu: " + err.message;
      }
    }

    async function payCard() {
      const clientSecret = document.getElementById('cardClientSecret').value.trim();
      const resultEl = document.getElementById('result');

      if (!cardElement) {
        resultEl.innerHTML = "⚠️ Klik 'Init Card Payment' terlebih dahulu!";
        return;
      }

      resultEl.innerHTML = "Processing card payment...";

      try {
        const result = await Airwallex.confirmPaymentIntent({
          element: cardElement,
          client_secret: clientSecret
        });

        if (result.status === 'SUCCEEDED') {
          resultEl.innerHTML = "✅ Card Payment Success!";
        } else if (result.status === 'REQUIRES_ACTION') {
          resultEl.innerHTML = "⚠️ Card butuh autentikasi lanjutan (3DS)";
        } else {
          resultEl.innerHTML = "❌ Card Payment Failed";
        }
      } catch (err) {
        console.error(err);
        resultEl.innerHTML = "❌ Error: " + err.message;
      }
    }

    async function initDropinPayment() {
      const intentId = document.getElementById('intentId').value.trim();
      const clientSecret = document.getElementById('clientSecret').value.trim();
      const currencyCode = document.getElementById('currency').value.trim().toUpperCase();
      const resultEl = document.getElementById('result');

      if (!intentId || !clientSecret || !currencyCode) {
        resultEl.innerHTML = "⚠️ Isi Intent ID, Currency, dan Client Secret terlebih dahulu!";
        return;
      }

      resultEl.innerHTML = "Membangun tampilan... Mohon tunggu.";

      try {
        await Airwallex.init({
          env: "prod", // demo or prod
          origin: window.location.origin
        });

        const container = document.getElementById('dropin-container');
        container.innerHTML = "";

        // Menambahkan parameter 'currency' dan 'layout' sesuai dokumentasi
        dropInElement = Airwallex.createElement('dropIn', {
          intent_id: intentId,
          client_secret: clientSecret,
          currency: currencyCode,
          applePayRequestOptions: {
            countryCode: 'US',
            buttonType: 'buy',
            buttonColor: 'white-with-line'
          },
          layout: {
            type: "accordion" // atau "tab"
          }
        });

        // Jika form berhasil di-load
        dropInElement.on('ready', () => {
          resultEl.innerHTML = "✅ Form siap! Jika Anda tidak melihat form, berarti akun Demo Anda belum mengaktifkan metode pembayaran apa pun untuk mata uang ini.";
        });

        // Jika ada error spesifik dari form
        dropInElement.on('error', (event) => {
          console.error("Airwallex Element Error:", event);
          resultEl.innerHTML = "❌ Gagal memuat UI: " + (event.detail?.message || JSON.stringify(event));
        });
        
        dropInElement.mount('dropin-container');

      } catch (err) {
        console.error(err);
        resultEl.innerHTML = "❌ Gagal memuat UI: " + err.message;
      }
    }
  </script>
</body>
</html>
